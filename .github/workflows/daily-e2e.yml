name: Daily end-to-end verification

# Runs every day at 02:30 UTC (08:00 IST). Also triggerable manually from
# the Actions tab for ad-hoc reruns. The actual probe logic lives in
# e2e/ci/ so it can be invoked locally with the same code path.

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write   # to open a tracking issue on failure

jobs:
  smoke-suite:
    name: Playwright smoke + auth + map
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: e2e/package-lock.json
      - name: Install Playwright + Chromium
        working-directory: e2e
        run: |
          npm ci --no-audit --no-fund
          npx playwright install --with-deps chromium
      - name: Run Playwright suite (read-only)
        working-directory: e2e
        run: npx playwright test --reporter=list
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  red-team-probe:
    name: Red-team — non-civic photos must reject
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - run: bash e2e/ci/red-team.sh

  happy-path:
    name: Happy path — Case A → verified_resolved
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - run: bash e2e/ci/happy-path.sh

  notify-on-failure:
    name: Open tracking issue on regression
    needs: [smoke-suite, red-team-probe, happy-path]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily E2E regression — ${today}`,
              body: [
                "One or more jobs in the daily verification workflow failed.",
                "",
                `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                "",
                "Jobs checked:",
                "- Playwright smoke + auth + map",
                "- Red-team (4 non-civic photos must reject)",
                "- Happy path (Case A pothole → verified_resolved)",
                "",
                "Reproduce locally:",
                "```",
                "bash e2e/ci/red-team.sh",
                "bash e2e/ci/happy-path.sh",
                "cd e2e && npx playwright test",
                "```",
              ].join("\n"),
              labels: ["regression", "automated"],
            });
